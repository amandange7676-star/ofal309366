<section class="section-wrapper contact-11-section">
	<!-- Left Form Area -->
	<div class="contact-11-left">
		<h2>Contact Our Water Bottle Manufacturing Team</h2>
		<p>Kindly complete the following form, and we will ensure your inquiry is directed to the appropriate department manager.</p>

		<form class="contact-11-form" method="POST" id="contact-form">
			<div class="row">
				<div class="col-sm-6">
					<div class="form-group">
						<label>Full Name</label>
						<input type="text" placeholder="Name" name="name" required="">
					</div>
				</div>
				<div class="col-sm-6">
					<div class="form-group">
						<label>Corporate Email <span style="color:red">*</span></label>
						<input type="email" placeholder="Email" name="email" required="">
					</div>
				</div>
				<div class="col-sm-12">
					<div class="form-group">
						<label>Inquiry Details</label>
						<textarea placeholder="Message" name="message" rows="5" required=""></textarea>
					</div>
				</div>
			</div>
			<button type="button" class="contact-11-btn" onclick="sendEmailDataToGitHub()">Submit Inquiry</button>
			<!-- Form Message -->
			<div class="col-12">
				<div class="form-group">
					<p class="form-message"></p>
				</div>
			</div>
		</form>
	</div>

	<!-- Right Image and Info -->
	<div class="contact-11-right">
		<div class="contact-11-img">
			<img src="assets/images/contact-11.jpg" alt="Trainer">
		</div>
		<div class="contact-11-other">
			<h4>Additional Contact Methods</h4>
			<div class="contact-11-icon-box">
				<i class="ri-phone-line"></i>
				<p><strong>Telephone</strong><br><span class="client_mobile">+91 864 7635</span></p>
			</div>
			<div class="contact-11-icon-box">
				<i class="ri-mail-line"></i>
				<p><strong>Electronic Correspondence</strong><br><span class="client_email">askfitness@gmail.com</span></p>
			</div>
		</div>
	</div>
</section>
